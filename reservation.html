  <div style="max-width: 1000px; margin: auto">
    <div class="w3-padding-32"><span></span></div>
    <div class="w3-container">
      <form action="https://formsubmit.co/info@jokers-pub.ch" method="POST" id="form">
        <input type="hidden" name="_next" value="https://kontakt.jokers-pub.ch/submit" />
        <input type="hidden" name="_template" value="basic" />
        <input type="hidden" name="_captcha" value="false" />

        <div class="w3-row">
          <div class="w3-half w3-container">
            <label for="Vorname">Vorname</label>
            <input required type="text" id="Vorname" name="Vorname" placeholder="Dein Vorname..."
              oninvalid="this.setCustomValidity('Dein Vorname...')" oninput="this.setCustomValidity('')" />
          </div>
          <div class="w3-half w3-container">
            <label for="Nachname">Nachname</label>

        <div class="w3-row">
          <div class="w3-half w3-container">
            <label for="E-Mail">E-Mail Adresse</label>
            <input required type="mail" id="E-Mail" name="E-Mail" placeholder="Deine E-Mail Adresse..."
              oninvalid="this.setCustomValidity('Deine E-Mail Adresse...')" oninput="this.setCustomValidity('')" />
          </div>

          <div class="w3-half w3-container">
            <label for="Telefon">Telefon Nummer</label>

        <div class="w3-row">

            <input required type="date" id="Datum" name="Datum"
              oninvalid="this.setCustomValidity('Gib ein Datum ein...')" oninput="this.setCustomValidity('')"
              min="2025-09-12" />
          </div>

          <div class="w3-third w3-container">

            <input required type="time" id="Zeit" name="Zeit" oninvalid="this.setCustomValidity('Gib eine Zeit ein...')"

        <div class="w3 w3-container">

  <script>
    // Diese Funktion wird ausgefuehrt, sobald die Seite geladen ist
    window.addEventListener("DOMContentLoaded", function () {
      // Wir holen uns die Parameter aus der Adresszeile (URL)
      const urlParams = new URLSearchParams(window.location.search);

      // 1. Datum ausfuellen
      const datum = urlParams.get('datum');
      if (datum) {
        document.getElementById('Datum').value = datum;
      }

      // 2. Zeit ausfuellen
      const zeit = urlParams.get('zeit');
      if (zeit) {
        document.getElementById('Zeit').value = zeit;
      }

      // 3. Anliegen ausfuellen
      const anliegen = urlParams.get('anliegen');
      if (anliegen) {
        document.getElementById('Anliegen').value = anliegen;
      }
    });
  </script>

  <script>
    document.getElementById("message").style.display = "none";
    document.getElementById("form").onsubmit = function (e) {
      document.getElementById("form").style.display = "none";
      document.getElementById("message").style.display = "block";
    };

  </script>
  <script>
    // Datum Sperren
    const gesperrteTage = ['2026-03-25', '2026-04-01', '2026-04-21'];
    const picker = document.getElementById('Datum');

    picker.addEventListener('change', function (e) {
      if (gesperrteTage.includes(e.target.value)) {
        alert('Wir sind ausgebucht. Eine Reservierung ist an diesem Datum nicht mehr möglich!');
        e.target.value = '';
      }
    });
  </script>

  <script>

    document.addEventListener("DOMContentLoaded", function () {
      const dateInput = document.getElementById("Datum");

      // 1. Liste der Tage, an denen Montag/Sonntag erlaubt ist
      const eventTage = [];

      // 2. Verhindern, dass vergangene Tage gewaehlt werden
      const today = new Date().toISOString().split("T")[0];
      dateInput.min = today;

      // 3. Pruefung bei jeder Auswahl
      dateInput.addEventListener("change", function () {
        const selectedValue = this.value; // Das gewaehlte Datum (z.B. "2026-03-29")
        const selectedDate = new Date(selectedValue);
        const dayOfWeek = selectedDate.getDay();

        // PRUEFUNG: Ist das Datum in der Ausnahme-Liste?
        const istEventTag = eventTage.includes(selectedValue);

        // Wenn es KEIN Event-Tag ist, gelten die Sperrtage
        if (!istEventTag) {
          if (dayOfWeek === 0 || dayOfWeek === 1) {
            alert("An diesem Tag ist das Joker's Pub geschlossen. Bitte wählen Sie ein anderes Datum.");
            this.value = "";
          }
        }
        // Wenn es ein Event-Tag ist, passiert nichts – die Auswahl bleibt gueltig!
      });
    });



  </script>
