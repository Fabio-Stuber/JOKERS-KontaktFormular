<!doctype html>
<html class="scroll-smooth dark" lang="de">

    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Search Engine Optimization -->
        <title>Seite nicht gefunden | Fabio Stuber</title>
        <meta name="description" content="Fehler 404: Die gesuchte Seite konnte leider nicht gefunden werden. Kehre zurück zur Startseite von Fabio Stuber." />
        <meta name="robots" content="noindex, follow" />
        <!-- Favicon mit automatischem Hell-/Dunkelwechsel -->
        <link rel="icon" type="image/svg+xml" href="img/Logo-FabioStuber.svg" />
        <!-- Open-Graph -->
        <meta property="og:type" content="website" />
        <meta property="og:title" content="Seite nicht gefunden | Fabio Stuber" />
        <meta property="og:description" content="Fehler 404: Diese Seite ist wohl im digitalen Nirgendwo verschwunden." />
        <meta property="og:image" content="https://www.fabio-stuber.com/img/Background-FabioStuber.jpg" />
        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Maven+Pro:wght@400..900&display=swap" rel="stylesheet">
        <!-- Tailwind-Script -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- Stylesheet -->
        <style type="text/tailwindcss">
            @custom-variant dark (&:where(.dark, .dark *));
                         
            @theme {
                --font-sans: 'Maven Pro', sans-serif;
            }

            @keyframes lebendig {
                0%, 100% { 
                    background-position: 0% center;
                    filter: drop-shadow(0 0 10px rgba(45, 212, 191, 0.15));
                }
                50% { 
                    background-position: 100% center;
                    filter: drop-shadow(0 0 35px rgba(45, 212, 191, 0.45));
                }
            }

            @keyframes sanftesAtmen {
                0%, 100% {
                    transform: scale(1);
                }
                50% {
                    transform: scale(1.03);
                }
            }

            .leuchtende-404 {
                background-size: 200% auto;
                animation: lebendig 4s ease-in-out infinite, sanftesAtmen 6s ease-in-out infinite;
            }
        </style>
        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body class="text-gray-900 bg-white dark:bg-gray-950 dark:text-gray-100 transition-colors duration-200 flex flex-col min-h-screen selection:bg-teal-500 selection:text-white dark:selection:bg-teal-400 dark:selection:text-gray-950">
        <!-- Navigation -->
        <header id="navigation"></header>

        <!-- Content -->
        <main class="grow flex items-center justify-center py-20 px-4 relative overflow-hidden">
            <div class="max-w-2xl w-full text-center space-y-8 relative z-10">

                <div class="inline-block select-none pointer-events-none active:scale-95 transition-transform duration-300">
                    <span class="text-9xl sm:text-12xl md:text-14xl font-black tracking-tighter bg-linear-to-r from-teal-500 via-cyan-300 to-teal-500 bg-clip-text text-transparent uppercase block leading-none leuchtende-404">
                        404
                    </span>
                </div>

                <div class="space-y-4">
                    <h2 class="text-3xl md:text-5xl font-black text-gray-800 dark:text-white uppercase tracking-tight">
                        HUCH...
                    </h2>
                    <div class="space-y-2">
                        <span class="inline-block text-teal-600 dark:text-teal-400 text-xs font-bold tracking-[0.2em] uppercase font-mono">
                            Fehler: Seite nicht gefunden
                        </span>
                        <h1 class="text-xl md:text-2xl font-black tracking-tight text-gray-700 dark:text-gray-300 uppercase">
                            Digitales Nirgendwo.
                        </h1>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-gray-400 font-mono tracking-wide leading-relaxed max-w-md mx-auto">
                        Die Seite, nach der du suchst, wurde entweder verschoben, gelöscht oder hat sich auf ein Stück Kuchen und einen Kaffee verabschiedet.
                    </p>
                </div>

                <hr class="border-gray-200 dark:border-gray-800/60 max-w-xs mx-auto" />

                <div class="flex flex-col sm:flex-row items-center justify-center gap-4 max-w-sm mx-auto pt-2">
                    <a class="w-full sm:w-auto bg-teal-500 hover:bg-teal-600 dark:bg-teal-400 dark:hover:bg-teal-500 text-gray-950 rounded-sm px-8 py-3 text-sm font-bold transition uppercase tracking-wider text-center" href="/">
                        Zur Startseite
                    </a>
                    <a class="w-full sm:w-auto border border-gray-300 dark:border-gray-700 text-gray-600 dark:text-gray-400 hover:text-teal-500 dark:hover:text-teal-400 hover:border-teal-500/50 rounded-sm px-8 py-3 text-sm font-medium transition backdrop-blur-xs uppercase tracking-wider text-center"
                        href="contact">
                        Problem melden
                    </a>
                </div>

            </div>
        </main>

        <!-- Footer -->
        <footer id="footer"></footer>
        <!-- Cookie Banner -->
        <div id="cookieBanner"></div>
        <!-- functions -->
        <script src="js/script.js"></script>
    </body>

</html>
